{% extends "base.html" %}
{% block title %}Password updated — CCF Attendance{% endblock %}
{% block content %}
<div class="mx-auto max-w-md">
    <div class="app-card app-card-body text-center sm:text-left">
        <span class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-emerald-50 text-emerald-600 sm:mx-0">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
        </span>
        <h1 class="mt-4 text-xl font-bold text-navy-900 sm:text-2xl">Password updated</h1>
        <p class="mt-2 text-sm text-slate-600">Your new password is saved. Use it next time you sign in.</p>
        <a class="app-primary mt-6 inline-flex" href="{% url 'accounts:profile' %}">Back to profile</a>
    </div>
</div>
{% endblock %}
